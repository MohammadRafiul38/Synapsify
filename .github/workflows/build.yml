name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Download Wrapper JAR and Set Permissions
        run: |
          # 1. Create the folders if they don't exist
          mkdir -p gradle/wrapper
          
          # 2. Download the binary JAR file from the official Gradle source
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          
          # 3. Make sure the script is executable
          chmod +x gradlew 

      - name: Build with Gradle
        run: ./gradlew :app:assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Synapsify-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"